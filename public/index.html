<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCI Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #c74b2a 0%, #f05a28 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
    }

    header .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-left: auto;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .avatar.assistant {
      background: linear-gradient(135deg, #c74b2a 0%, #f05a28 100%);
      color: white;
    }

    .avatar.user {
      background: #3b4261;
      color: #94a3b8;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      max-width: calc(100% - 44px);
    }

    .message.user .bubble {
      background: #1e3a5f;
      color: #e2e8f0;
      border-radius: 12px 4px 12px 12px;
    }

    .message.assistant .bubble {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 4px 12px 12px 12px;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble pre {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }
    .bubble code {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
    }
    .bubble :not(pre) > code {
      background: #0f1117;
      border: 1px solid #2d3148;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble strong { color: #f1f5f9; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid #2d3148; padding: 6px 10px; text-align: left; }
    .bubble th { background: #0f1117; color: #94a3b8; }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 16px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #475569;
      pointer-events: none;
    }

    .empty-state .icon {
      width: 56px;
      height: 56px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .empty-state p { font-size: 14px; }

    #input-area {
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      padding: 16px 24px;
      flex-shrink: 0;
    }

    #input-wrapper {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }

    #input-wrapper:focus-within {
      border-color: #f05a28;
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      font-family: inherit;
    }

    #message-input::placeholder { color: #475569; }

    #send-btn {
      background: #f05a28;
      border: none;
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      color: white;
    }

    #send-btn:hover { background: #d94d20; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #334155;
      margin-top: 8px;
    }

    .error-bubble {
      background: #2d1515 !important;
      border-color: #7f1d1d !important;
      color: #fca5a5 !important;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">OCI</div>
  <h1>OCI Assistant</h1>
  <span class="subtitle">Powered by Claude</span>
</header>

<div id="chat-container">
  <div class="empty-state" id="empty-state">
    <div class="icon">☁️</div>
    <p>Ask me anything about your OCI tenancy</p>
    <p style="font-size:12px">e.g. "List my compute instances" · "Show all VCNs" · "What buckets do I have?"</p>
  </div>
</div>

<div id="input-area">
  <div id="input-wrapper">
    <textarea id="message-input" placeholder="Ask about your OCI resources…" rows="1"></textarea>
    <button id="send-btn" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Enter to send · Shift+Enter for newline</p>
</div>

<script>
  const chatContainer = document.getElementById('chat-container');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  // Full conversation history (including tool_use / tool_result blocks for context)
  let history = [];
  let isLoading = false;

  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function appendMessage(role, content, isError = false) {
    emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error-bubble' : '');

    if (role === 'assistant' && !isError) {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return msg;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar assistant';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function hideTyping() {
    const indicator = document.getElementById('typing-indicator');
    if (indicator) indicator.remove();
  }

  function setLoading(loading) {
    isLoading = loading;
    sendBtn.disabled = loading;
    input.disabled = loading;
    if (loading) showTyping(); else hideTyping();
  }

  async function send() {
    const message = input.value.trim();
    if (!message || isLoading) return;

    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', message);
    setLoading(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });

      const data = await res.json();

      if (!res.ok) {
        appendMessage('assistant', `Error: ${data.error || res.statusText}`, true);
      } else {
        history = data.history;
        appendMessage('assistant', data.reply);
      }
    } catch (err) {
      appendMessage('assistant', `Network error: ${err.message}`, true);
    } finally {
      setLoading(false);
      input.focus();
    }
  }

  // Focus input on load
  input.focus();
</script>
</body>
</html>
